<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<title>I Giganti della Sardegna</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- Leaflet da CDN -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<style>
:root {
  --bg: #050814;
  --card: #101522;
  --accent: #f4c542;
  --accent2: #4ec3ff;
  --accent3: #ff6f61;
  --accent4: #7bd389;
  --accent5: #c792ea;
  --text: #f7f7f7;
  --soft: #d0d4e0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
}

.app {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  background: #0b1020;
  display: flex;
  flex-direction: column;
}

/* Header */
header {
  padding: 12px 14px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

header h1 {
  font-size: 18px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

header p {
  margin-top: 4px;
  font-size: 11px;
  color: var(--soft);
}

.lang {
  margin-top: 8px;
  display: flex;
  justify-content: center;
  gap: 4px;
}

.lang button {
  border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.4);
  background: rgba(0,0,0,0.3);
  color: #fff;
  font-size: 10px;
  padding: 3px 6px;
  cursor: pointer;
}

/* Pagine */
main {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.page {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 10px 14px 70px;
}

.hidden { display: none; }

/* Hero */
.hero {
  position: relative;
  height: 240px;
  border-radius: 18px;
  overflow: hidden;
  background: #000;
  box-shadow: 0 10px 25px rgba(0,0,0,0.7);
}

.hero-bg {
  position: absolute;
  inset: 0;
  background-image: url("assets/cover.jpg");
  background-size: cover;
  background-position: center;
  filter: saturate(1.1) contrast(1.05) brightness(0.9);
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.1), rgba(0,0,0,0.85));
}

.hero-content {
  position: absolute;
  inset: auto 14px 14px 14px;
}

.hero-kicker {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: #ffefb3;
}

.hero-title {
  margin-top: 4px;
  font-size: 20px;
  font-weight: 800;
}

.hero-sub {
  margin-top: 4px;
  font-size: 11px;
}

/* Pulsante principale */
.btn-primary {
  margin: 16px auto 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 20px;
  border-radius: 999px;
  border: none;
  background: linear-gradient(135deg, var(--accent), #ffb347);
  color: #000;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}

/* Card */
.card {
  margin-top: 12px;
  padding: 10px 10px 8px;
  border-radius: 16px;
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 10px 24px rgba(0,0,0,0.6);
}

.card h3 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: #ffefb3;
  margin-bottom: 6px;
}

.card p {
  font-size: 11px;
  color: var(--soft);
  margin-bottom: 4px;
}

/* Liste protagonisti */
.protagonisti p::before {
  content: "• ";
  color: var(--accent);
}

/* Contenuti */
.list-title {
  font-weight: 600;
  margin-top: 6px;
}

/* Bottoni secondari */
.btn-secondary {
  margin-top: 8px;
  width: 100%;
  padding: 8px 10px;
  border-radius: 999px;
  border: 1px solid var(--accent2);
  background: #0b1428;
  color: #ffefb3;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
}

/* Mappa */
#map {
  width: 100%;
  height: 260px;
  border-radius: 14px;
  margin-top: 8px;
}

/* Filtri */
.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 8px;
}

.filter-btn {
  flex: 1 1 calc(50% - 4px);
  padding: 6px 8px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.2);
  background: #0b1428;
  color: var(--soft);
  font-size: 10px;
  cursor: pointer;
}

.filter-btn.active {
  border-color: var(--accent);
  background: #2b2410;
  color: #ffefb3;
}

/* Toolbar mappa */
.map-toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
}

.map-toolbar button {
  flex: 1;
  padding: 6px 8px;
  border-radius: 999px;
